<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Multi-Language Translator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>🌍 AI-Powered Multi-Language Translator</h1>

    <form method="POST">

    <div class="text-boxes">

        <textarea name="text" placeholder="Enter text here..." required></textarea>

        <textarea readonly placeholder="Translated text will appear here...">{% if translated_text %}{{ translated_text }}{% endif %}</textarea>

    </div>

    <div class="dropdowns">

        <select name="source_lang">
            {% for lang, code in languages.items() %}
            <option value="{{ code }}">{{ lang }}</option>
            {% endfor %}
        </select>

        <select name="target_lang">
            {% for lang, code in languages.items() %}
            <option value="{{ code }}">{{ lang }}</option>
            {% endfor %}
        </select>

    </div>

    <button type="submit">Translate Now</button>

</form>

    {% if translated_text %}
    <div class="result">
        <h2>Translated Text:</h2>
        <p>{{ translated_text }}</p>
    </div>
    {% endif %}

</div>

</body>
</html>
